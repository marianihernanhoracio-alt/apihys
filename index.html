<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APIHyS - Lic. Hernán Mariani</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .main-card { border-radius: 2.5rem; }
        .header-gradient { background: linear-gradient(180deg, #1d4ed8 0%, #1e40af 100%); }
        .service-btn { transition: all 0.2s ease; cursor: pointer; }
        .service-btn:active { transform: scale(0.97); }
        .glass-modal { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); display: none; position: fixed; inset: 0; align-items: center; justify-content: center; z-index: 100; }
        .glass-modal.active { display: flex; }
    </style>
</head>
<body class="flex flex-col items-center justify-start min-h-screen p-4 py-8 space-y-6">

    <div class="max-w-md w-full space-y-6">
        
        <!-- Tarjeta Principal -->
        <div class="main-card bg-white shadow-xl overflow-hidden border border-slate-100">
            <div class="header-gradient p-10 flex flex-col items-center text-white relative">
                <!-- Logo con iniciales HHM -->
                <div class="bg-white p-3 rounded-2xl shadow-lg mb-4 w-24 h-24 flex items-center justify-center border-4 border-blue-100">
                    <span class="text-blue-700 font-black text-3xl tracking-tighter">HHM</span>
                </div>
                <h1 class="text-3xl font-bold tracking-tighter uppercase italic">APIHyS</h1>
                <p class="text-blue-100 text-[10px] opacity-90 uppercase tracking-widest mt-1 text-center font-medium">Asesoría Profesional Independiente HyS</p>
            </div>

            <div class="p-8 text-center">
                <h2 class="text-2xl font-bold text-slate-800">Lic. Hernán Mariani</h2>
                <p class="text-blue-600 font-semibold mb-4 uppercase text-xs tracking-widest">Consultor</p>
                
                <div class="mb-8 space-y-3">
                    <a href="mailto:marianihernanhoracio@gmail.com" class="text-slate-500 text-sm hover:text-blue-600 transition-colors flex items-center justify-center underline underline-offset-4">
                        <i class="fas fa-envelope mr-2"></i> marianihernanhoracio@gmail.com
                    </a>
                    <p class="text-slate-500 text-sm font-medium flex items-center justify-center">
                        <i class="fas fa-mobile-alt mr-2 text-blue-500"></i> 221-5578701
                    </p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <a href="tel:+542215578701" class="flex flex-col items-center justify-center p-5 bg-slate-50 rounded-3xl border border-slate-100 hover:bg-blue-50 transition-all group">
                        <i class="fas fa-phone text-blue-600 text-xl mb-2 group-hover:scale-110 transition"></i>
                        <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest text-center">Llamar</span>
                    </a>
                    <a href="https://wa.me/542215578701" class="flex flex-col items-center justify-center p-5 bg-slate-50 rounded-3xl border border-slate-100 hover:bg-green-50 transition-all group">
                        <i class="fab fa-whatsapp text-green-600 text-2xl mb-2 group-hover:scale-110 transition"></i>
                        <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest text-center">WhatsApp</span>
                    </a>
                </div>
            </div>
        </div>

        <!-- Sección Privada -->
        <div class="main-card bg-white shadow-xl p-8 border border-slate-100">
            <div class="flex justify-between items-center mb-6 border-b border-slate-50 pb-4">
                <h3 class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">Servicios Privados</h3>
                <i id="lockIcon" class="fas fa-lock text-green-500 text-xs transition-colors"></i>
            </div>

            <div class="space-y-4">
                <button onclick="checkAccess('charla')" class="service-btn w-full flex items-center justify-between p-5 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-2xl shadow-lg shadow-indigo-100">
                    <div class="text-left">
                        <p class="font-bold text-sm tracking-tight italic">✨ Charlas de 5'</p>
                        <p class="text-[10px] opacity-80 font-medium">Contenido técnico inmediato</p>
                    </div>
                    <i class="fas fa-bullhorn opacity-40"></i>
                </button>

                <button onclick="checkAccess('riesgo')" class="service-btn w-full flex items-center justify-between p-5 bg-slate-800 text-white rounded-2xl shadow-lg shadow-slate-200">
                    <div class="text-left">
                        <p class="font-bold text-sm tracking-tight italic">✨ Diagnóstico Express</p>
                        <p class="text-[10px] opacity-80 font-medium">Redacción de informes técnicos</p>
                    </div>
                    <i class="fas fa-clipboard-check opacity-40"></i>
                </button>

                <button onclick="checkAccess('ley')" class="service-btn w-full flex items-center justify-between p-5 bg-blue-900 text-white rounded-2xl shadow-lg shadow-blue-200">
                    <div class="text-left">
                        <p class="font-bold text-sm tracking-tight italic">✨ Consulta Normativa</p>
                        <p class="text-[10px] opacity-80 font-medium">Leyes y Decretos (SRT)</p>
                    </div>
                    <i class="fas fa-gavel opacity-40"></i>
                </button>
            </div>
        </div>
    </div>

    <p class="text-[10px] text-slate-400 uppercase tracking-[0.3em] font-bold">© APIHyS Consultoría</p>

    <!-- Modal Login -->
    <div id="loginModal" class="glass-modal p-6">
        <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 text-center shadow-2xl">
            <div class="bg-blue-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-user-shield text-2xl text-blue-600"></i>
            </div>
            <h4 class="text-lg font-bold text-slate-800 mb-1">Acceso Consultor</h4>
            <p class="text-[10px] text-slate-400 mb-6 uppercase tracking-widest font-bold">Ingrese clave de Licenciado</p>
            <input type="password" id="passInput" class="w-full bg-slate-100 border-2 border-transparent p-4 rounded-2xl text-center text-2xl tracking-[0.6em] focus:ring-0 focus:border-blue-500 outline-none mb-4 transition-all" placeholder="••••">
            <div class="flex flex-col space-y-3">
                <button onclick="verifyPass()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-all uppercase text-xs tracking-widest">Desbloquear</button>
                <button onclick="closeLogin()" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest hover:text-slate-600 transition-colors py-2">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Modal IA -->
    <div id="iaModal" class="glass-modal p-4">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] overflow-hidden flex flex-col max-h-[90vh] shadow-2xl">
            <div id="iaHeader" class="p-6 text-white font-bold flex justify-between items-center bg-slate-800">
                <span id="iaTitle" class="tracking-tight uppercase text-xs font-black">Asistente APIHyS</span>
                <button onclick="closeIA()" class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center"><i class="fas fa-times text-xs"></i></button>
            </div>
            <div class="p-6 space-y-4 overflow-y-auto">
                <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Ingrese tema a procesar:</p>
                <textarea id="iaInput" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all" rows="3" placeholder="Ej: Riesgo eléctrico..."></textarea>
                <button id="genBtn" onclick="generate()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold flex items-center justify-center space-x-2 shadow-lg active:scale-95 transition-all">
                    <span id="btnText" class="uppercase text-xs tracking-widest">Generar con IA</span>
                    <div id="btnLoad" class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin hidden"></div>
                </button>
                <div id="iaOutput" class="hidden p-6 bg-blue-50 rounded-2xl text-[11px] text-slate-700 border border-blue-100 whitespace-pre-wrap leading-relaxed shadow-inner font-medium"></div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const MASTER_PASS = "BILOINA";
        let isUnlocked = false;
        let pendingAction = null;
        let currentMode = '';

        function checkAccess(mode) {
            if (isUnlocked) {
                openIA(mode);
            } else {
                pendingAction = mode;
                document.getElementById('loginModal').classList.add('active');
                document.getElementById('passInput').focus();
            }
        }

        function verifyPass() {
            const val = document.getElementById('passInput').value;
            if (val === MASTER_PASS) {
                isUnlocked = true;
                const lockIcon = document.getElementById('lockIcon');
                lockIcon.classList.replace('fa-lock', 'fa-unlock-alt');
                lockIcon.classList.replace('text-green-500', 'text-blue-600');
                closeLogin();
                if (pendingAction) openIA(pendingAction);
            } else {
                alert("Clave incorrecta");
                document.getElementById('passInput').value = '';
            }
        }

        function closeLogin() { 
            document.getElementById('loginModal').classList.remove('active'); 
            document.getElementById('passInput').value = '';
        }

        function openIA(mode) {
            currentMode = mode;
            document.getElementById('iaOutput').classList.add('hidden');
            document.getElementById('iaInput').value = '';
            document.getElementById('iaModal').classList.add('active');
            
            const titles = { 
                'charla': 'Charlas Técnicas 5 min', 
                'riesgo': 'Informe de Diagnóstico', 
                'ley': 'Asesoría Normativa Argentina' 
            };
            document.getElementById('iaTitle').innerText = titles[mode];
        }

        function closeIA() { 
            document.getElementById('iaModal').classList.remove('active'); 
        }

        async function generate() {
            const input = document.getElementById('iaInput').value;
            const output = document.getElementById('iaOutput');
            const btnText = document.getElementById('btnText');
            const btnLoad = document.getElementById('btnLoad');

            if (!input) return;
            btnText.classList.add('hidden');
            btnLoad.classList.remove('hidden');

            const prompts = {
                'charla': "Genera una charla de seguridad de 5 minutos técnica y profesional para trabajadores sobre: ",
                'riesgo': "Redacta un hallazgo técnico formal para informe de auditoría de Higiene y Seguridad (Riesgo, Ley aplicada y Recomendación) para: ",
                'ley': "Actúa como especialista legal en Higiene y Seguridad en Argentina. Explica la normativa SRT o Leyes aplicada a: "
            };

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompts[currentMode] + input }] }] })
                });
                const data = await res.json();
                output.innerText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Error al generar respuesta.";
                output.classList.remove('hidden');
            } catch (e) {
                output.innerText = "Error de conexión.";
                output.classList.remove('hidden');
            } finally {
                btnText.classList.remove('hidden');
                btnLoad.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
